<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: linear-gradient(135deg, #26215C 0%, #1a1550 60%, #0d0d2e 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
  }

  /* ── 左：図 ── */
  .diagram {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex-shrink: 0;
  }

  .lv3-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .lv3-label {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .lv3-tags {
    display: flex;
    gap: 10px;
  }
  .lv3-tag {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 68px;
  }
  .tag-en {
    font-size: 15px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.03em;
  }
  .tag-ja {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  .arrow-dim {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1;
    color: rgba(255,255,255,0.25);
    font-size: 20px;
    margin: 8px 0;
  }

  .lv2-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(124,58,237,0.25);
    border: 1.5px solid rgba(124,58,237,0.7);
    border-radius: 10px;
    padding: 12px 28px;
    gap: 4px;
  }
  .lv2-name {
    font-size: 18px;
    font-weight: 700;
    color: #CECBF6;
    letter-spacing: 0.05em;
  }
  .lv2-badge {
    font-size: 10px;
    color: rgba(206,203,246,0.7);
    letter-spacing: 0.03em;
  }

  .arrow-bright {
    color: #7c3aed;
    font-size: 22px;
    margin: 8px 0;
    line-height: 1;
  }

  .lv1-wrap {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 15px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.05em;
  }

  /* ── 右：テキスト ── */
  .content {
    flex: 1;
    max-width: 560px;
  }
  .eyebrow {
    font-size: 12px;
    color: rgba(206,203,246,0.7);
    letter-spacing: 0.15em;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .main-title {
    font-size: 32px;
    font-weight: 700;
    line-height: 1.55;
    letter-spacing: 0.02em;
    margin-bottom: 24px;
    color: #fff;
  }
  .main-title em {
    font-style: normal;
    color: #CECBF6;
    text-decoration: underline;
    text-underline-offset: 5px;
    text-decoration-thickness: 1.5px;
  }
  .sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.75;
    letter-spacing: 0.03em;
  }

  .logo {
    position: absolute;
    bottom: 32px;
    right: 48px;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.1em;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 左：役割の図 -->
  <div class="diagram">
    <div class="lv3-wrap">
      <div class="lv3-label">この先の専門領域</div>
      <div class="lv3-tags">
        <div class="lv3-tag">
          <span class="tag-en">HRD</span>
          <span class="tag-ja">人材開発</span>
        </div>
        <div class="lv3-tag">
          <span class="tag-en">OD</span>
          <span class="tag-ja">組織開発</span>
        </div>
        <div class="lv3-tag">
          <span class="tag-en">HRBP</span>
          <span class="tag-ja">戦略人事</span>
        </div>
      </div>
    </div>

    <div class="arrow-dim">↑<br>↑</div>

    <div class="lv2-wrap">
      <div class="lv2-name">研修のプロ</div>
      <div class="lv2-badge">このプログラムの到達点</div>
    </div>

    <div class="arrow-bright">↑</div>

    <div class="lv1-wrap">研修担当者</div>
  </div>

  <!-- 右：コピー -->
  <div class="content">
    <div class="eyebrow">教育担当者向けプログラム｜きづきくみたて工房</div>
    <h1 class="main-title">「とにかく研修を回す人」から<br><em>組織の課題を解決する研修のプロ</em>へ</h1>
    <p class="sub">成人発達理論・HPI・適応課題・生成AIという<br>4つの革新的な技法を軸に、<br>課題診断から育成計画まで一気通貫で設計できる<br>思考の型を身につける研修設計プログラムです。</p>
  </div>

  <div class="logo">kizukikumitate.com</div>

</body>
</html>
