<style>
:root{
  --night:#14172B; --panel:#1E2240; --panel-2:#262B4E;
  --washi:#F3EBD8; --washi-2:#EAE0C6; --ink:#2B2620;
  --shu:#C43C2A; --kin:#C9A227; --mist:#A9AEC9; --line:#3A4066;
  --serif:"Shippori Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  --goth:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--night);color:var(--washi);font-family:var(--goth);line-height:1.75;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,#232852 0%,transparent 60%);}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 80px}
.eyebrow{font-size:11px;letter-spacing:.35em;color:var(--kin);text-transform:uppercase;margin-bottom:8px}
h1{font-family:var(--serif);font-weight:800;font-size:34px;letter-spacing:.12em;line-height:1.4}
h2{font-family:var(--serif);font-weight:700;font-size:21px;letter-spacing:.08em;margin-bottom:6px}
.sub{color:var(--mist);font-size:14px;margin-top:10px}
.step-nav{display:flex;gap:6px;margin:18px 0 26px;flex-wrap:wrap}
.step-dot{font-size:11px;letter-spacing:.12em;color:var(--mist);padding:4px 10px;border:1px solid var(--line);border-radius:999px;opacity:.55}
.step-dot.on{color:var(--kin);border-color:var(--kin);opacity:1}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
button{font-family:var(--goth);cursor:pointer;border:none;border-radius:10px;font-size:15px}
.btn{background:var(--shu);color:#FFF7EC;padding:13px 22px;font-weight:700;letter-spacing:.08em;width:100%;transition:transform .15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mist);font-weight:500}
.btn:disabled{opacity:.4;cursor:default}
.hidden{display:none!important}
/* chat */
.chat{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.msg{max-width:86%;padding:12px 15px;border-radius:14px;font-size:15px;white-space:pre-wrap}
.msg.ai{background:var(--panel);border:1px solid var(--line);align-self:flex-start;border-top-left-radius:4px}
.msg.me{background:#3B3020;border:1px solid #5a4a2c;align-self:flex-end;border-top-right-radius:4px}
.msg.thinking{color:var(--mist);font-style:italic}
.inputrow{display:flex;gap:8px}
textarea,input[type=text]{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;color:var(--washi);
  font-family:var(--goth);font-size:15px;padding:12px;resize:none;outline:none}
textarea:focus,input:focus{border-color:var(--kin)}
.send{background:var(--kin);color:var(--ink);font-weight:700;padding:0 18px;border-radius:10px}
/* yokai summary */
.yokai-found{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--kin);border-radius:14px;padding:20px;text-align:center}
.yokai-found .name{font-family:var(--serif);font-size:26px;color:var(--kin);letter-spacing:.15em;margin:6px 0}
.yokai-found dl{text-align:left;margin-top:14px;font-size:14px}
.yokai-found dt{color:var(--mist);font-size:11px;letter-spacing:.2em;margin-top:10px}
/* ofuda type cards */
.ofuda-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ofuda{background:var(--washi);color:var(--ink);border-radius:6px 6px 12px 12px;padding:16px 12px 14px;text-align:center;
  border-top:6px solid var(--type-c,var(--shu));position:relative;transition:transform .15s;box-shadow:0 3px 14px rgba(0,0,0,.35)}
.ofuda:active{transform:scale(.97)}
.ofuda .tname{font-family:var(--serif);font-size:22px;font-weight:800;letter-spacing:.3em;writing-mode:vertical-rl;margin:0 auto;height:84px}
.ofuda .ttag{font-size:12px;margin-top:8px;line-height:1.6}
.ofuda .torigin{font-size:10px;color:#7a6f5c;margin-top:6px}
/* kakawari cards */
.kcard{background:var(--washi);color:var(--ink);border-radius:12px;padding:16px;margin-bottom:12px;border-left:6px solid var(--type-c,var(--shu));box-shadow:0 3px 14px rgba(0,0,0,.3)}
.kcard h3{font-family:var(--serif);font-size:18px;letter-spacing:.1em}
.kcard p{font-size:13px;margin-top:6px}
.kcard .ex{font-size:12px;color:#6d6353;margin-top:8px;padding-top:8px;border-top:1px dashed #cfc3a6}
.kcard .pick{margin-top:12px;background:var(--ink);color:var(--washi);padding:9px 16px;border-radius:8px;font-size:13px;width:auto}
/* verbs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}
.tab{flex:none;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--mist);font-size:13px}
.tab.on{background:var(--vc,var(--kin));color:var(--ink);border-color:transparent;font-weight:700}
.verbgrid{display:flex;flex-wrap:wrap;gap:8px}
.verb{padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--panel);color:var(--washi);font-size:14px}
.verb.sel{background:var(--kin);color:var(--ink);border-color:var(--kin);font-weight:700}
.verbhint{font-size:12px;color:var(--mist);min-height:2.6em;margin-top:10px;padding:8px 10px;background:var(--panel-2);border-radius:8px}
.selcount{font-size:12px;color:var(--kin);margin:10px 0}
/* contract */
.contract{background:var(--washi);color:var(--ink);border-radius:4px;padding:28px 22px;position:relative;box-shadow:0 6px 26px rgba(0,0,0,.5);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(120,100,60,.08) 31px,rgba(120,100,60,.08) 32px)}
.contract .ctitle{font-family:var(--serif);font-weight:800;font-size:24px;letter-spacing:.4em;text-align:center;margin-bottom:18px;
  border-bottom:2px solid var(--ink);padding-bottom:10px}
.contract .cbody{font-family:var(--serif);font-size:14.5px;line-height:2.1;white-space:pre-wrap}
.stamp{position:absolute;right:18px;bottom:18px;width:64px;height:64px;border:3px solid var(--shu);border-radius:8px;color:var(--shu);
  display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:26px;font-weight:800;transform:rotate(-8deg);
  opacity:0;letter-spacing:0}
.stamp.on{animation:stamp .5s ease-out forwards}
@keyframes stamp{0%{opacity:0;transform:rotate(-8deg) scale(2.2)}70%{opacity:1;transform:rotate(-8deg) scale(.94)}100%{opacity:.88;transform:rotate(-8deg) scale(1)}}
@media (prefers-reduced-motion:reduce){.stamp.on{animation:none;opacity:.88}.btn:active,.ofuda:active{transform:none}}
/* ema board */
.ema{background:var(--washi);color:var(--ink);border-radius:8px 8px 14px 14px;padding:14px 16px;margin-bottom:12px;
  border-top:8px solid #8a6b3f;box-shadow:0 3px 12px rgba(0,0,0,.35)}
.ema .ename{font-family:var(--serif);font-weight:800;font-size:17px;letter-spacing:.1em}
.ema .emeta{font-size:11px;color:#7a6f5c;margin-top:2px}
.ema .ebody{font-size:13px;margin-top:8px}
.ema .react{margin-top:10px;background:transparent;border:1px solid #b8a880;color:#6d5c3a;border-radius:999px;padding:6px 14px;font-size:12px}
.note{font-size:12px;color:var(--mist);margin-top:12px}
.err{color:#E58B7D;font-size:13px;margin-top:8px}
:focus-visible{outline:2px solid var(--kin);outline-offset:2px}
</style>
</head>

const VERBS=[
 {id:"kizuku",name:"気づく系",color:"#7B9E89",verbs:[["名を呼ぶ","「あ、◯◯が出た」と心の中で名指しする"],["深呼吸する","3秒吸って6秒吐く。まず体から"],["数を数える","10数える間、妖怪に発言権を与えない"],["メモする","出現日時と状況を記録。妖怪観察日誌"],["立ち止まる","何もしない。それも立派な初動"],["席を立つ","物理的に場を離れて仕切り直す"],["水を飲む","一口の間が、妖怪との距離になる"],["空を見る","視線を上げると思考の縮尺が変わる"],["体に聞く","肩・胃・喉。妖怪はどこに居座っている?"],["実況する","「今、焦り妖怪が騒いでいる」と中継する"],["観察する","退治せず、まず生態を眺める"],["気配を記す","出そうな予兆をあらかじめリスト化しておく"],["合図を決める","出現時のセルフサイン(ペンを置く等)を決める"],["鏡を見る","今の自分の顔を確認する。憑かれていないか"],["印を結ぶ","指を組む・手を握るなど身体のスイッチを作る"],["点呼を取る","今日出た妖怪を夜に数え上げる"],["天気をつける","心の空模様として記録する(曇り時々小豆洗い)"],["足を感じる","地面との接点に意識を戻す"]]},

const DISCOVERY_PROMPT=`あなたは「妖怪と式神ワークショップ」の聞き手です。参加者との対話を通じて、その人の中にいる「妖怪」(繰り返し現れる思考・感情・行動のパターン)を見つけ、名付ける手伝いをします。

進め方:
1. 最初の問いは必ず具体例を添えて尋ねる。例:「あなた自身や職場に、繰り返し現れる"怪奇"やよろしくない行動・空気はありますか?たとえば、会議で本音が出ない、つい先延ばししてしまう、頼まれると断れない——そんな心当たりから聞かせてください」
2. その瞬間の身体感覚・頭に浮かんだ言葉を聞く
3. 「それはいつ・どんな条件で現れますか?」と出現パターンを探る
4. 十分に輪郭が見えたら「それを一体の妖怪だとしたら、どんな姿でしょう?」と外在化を促す
5. 名前の候補を2〜3案提示し、参加者自身に選ばせるか、自分で名付けてもらう

作法:
- 質問は一度に一つだけ。短く、温かく。3文以内
- 診断・分析はしない。本人の言葉を大切にし、本人が名付けることを最優先する
- 妖怪は敵ではなく「何かを知らせに来た存在」として扱う
- 深刻になりすぎたら、少し軽やかさを取り戻す
- 5〜7往復を目安に、命名まで導く

命名が確定したら、返答の最後に必ず次のJSONだけを1行で出力する:
{"yokai_name":"妖怪名","appearance":"姿の描写(30字以内)","trigger":"出現条件(30字以内)","message":"この妖怪が知らせに来ていること(40字以内)"}`;

/* ===================== API(本番: kizukikumitate の Vercel 経由) ===================== */
/* アーティファクトの api.anthropic.com 直呼び & window.storage は本番では動かないため、
   Claude は /api/yokai-claude、共有ストア(絵馬)は /api/yokai-room に中継する。 */
const API_BASE="https://democracy-fitness-survey.vercel.app";
async function callClaudeTask(task,payload){
  const r=await fetch(API_BASE+"/api/yokai-claude",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify({task,...payload})});
  if(!r.ok)throw new Error("claude "+r.status);
  const d=await r.json();return d.text||"";
}
async function roomApi(action,payload){
  const r=await fetch(API_BASE+"/api/yokai-room",{method:"POST",
    headers:{"Content-Type":"application/json"},body:JSON.stringify({action,...payload})});
  if(!r.ok)throw new Error("room "+r.status);
  return r.json();
}

/* ---- 発見対話 ---- */
async function startDiscovery(){
  S.discovery=[];S.yokai=null;go("discover");
  const msgs=[{role:"user",content:"こんにちは。妖怪を見つける対話を始めてください。"}];
  await aiTurn(S.discovery,()=>callClaudeTask("discovery",{messages:msgs}),true);
}
function renderDiscover(){
  const chat=S.discovery.map(m=>`<div class="msg ${m.role==="assistant"?"ai":"me"}">${esc(m.text)}</div>`).join("");
  const found=S.yokai?`
    <div class="yokai-found">
      <div class="eyebrow">発見</div>
      <div class="name">${esc(S.yokai.yokai_name)}</div>
      <dl>
        <dt>すがた</dt><dd>${esc(S.yokai.appearance||"")}</dd>
        <dt>あらわれるとき</dt><dd>${esc(S.yokai.trigger||"")}</dd>
        <dt>知らせに来ていること</dt><dd>${esc(S.yokai.message||"")}</dd>
      </dl>
      <button class="btn" style="margin-top:16px" onclick="go('type')">この妖怪と対峙する</button>
    </div>`:"";
  const noUserYet=!S.discovery.some(m=>m.role==="user");
  const chips=(noUserYet&&!S.yokai&&S.discovery.length)?`
    <div class="verbgrid" style="margin-bottom:12px">${[
      "会議で本音が出ない","つい先延ばししてしまう","頼まれると断れない",
      "細かいことが気になって進まない","「どうせ変わらない」空気がある","誰かと比べて落ち込む"
    ].map(c=>`<button class="verb" onclick="chipAnswer('${c}')">${c}</button>`).join("")}</div>
    <p class="note" style="margin:0 0 10px">近いものをタップするか、自分の言葉で書いてください。</p>`:"";
  const input=S.yokai?"":`${chips}
    <div class="inputrow">
      <textarea id="din" rows="2" placeholder="ここに答えを書く"></textarea>
      <button class="send" onclick="sendDiscovery()">送る</button>
    </div>`;
  app.innerHTML=`<h2>妖怪を見つける</h2><p class="sub" style="margin-bottom:16px">聞き手との対話です。思いつくままで大丈夫。</p>
    <div class="chat" id="chatbox">${chat}</div>${found}${input}<div id="derr"></div>`;
  const box=document.getElementById("chatbox");if(box)window.scrollTo(0,document.body.scrollHeight);
}
async function chipAnswer(t){
  S.discovery.push({role:"user",text:t});renderDiscover();
  const msgs=[{role:"user",content:"こんにちは。妖怪を見つける対話を始めてください。"},
    ...S.discovery.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}))];
  await aiTurn(S.discovery,()=>callClaudeTask("discovery",{messages:msgs}),true);
}
async function sendDiscovery(){
  const el=document.getElementById("din");const t=el.value.trim();if(!t)return;
  S.discovery.push({role:"user",text:t});renderDiscover();
  const msgs=[{role:"user",content:"こんにちは。妖怪を見つける対話を始めてください。"},
    ...S.discovery.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}))];
  await aiTurn(S.discovery,()=>callClaudeTask("discovery",{messages:msgs}),true);
}
async function aiTurn(log,produce,checkJson){
  log.push({role:"assistant",text:"…(考え中)",thinking:true});render();
  try{
    const text=await produce();
    log.pop();
    let clean=text;
    if(checkJson){
      const m=text.match(/\{[^{}]*"yokai_name"[^{}]*\}/);
      if(m){try{S.yokai=JSON.parse(m[0]);clean=text.replace(m[0],"").trim();}catch(e){}}
    }
    if(clean)log.push({role:"assistant",text:clean});
    render();
  }catch(e){
    log.pop();render();
    const errEl=document.getElementById("derr")||document.getElementById("qerr");
    if(errEl)errEl.innerHTML=`<p class="err">通信に失敗しました。もう一度送ってください。</p>`;
  }
}

/* ---- 問答 ---- */
function renderDialogue(){
  const chat=S.dialogue.map(m=>`<div class="msg ${m.role==="assistant"?"ai":"me"}">${esc(m.text)}</div>`).join("");
  const done=S.dialogueTurns>=2;
  app.innerHTML=`<h2>問答 —「${S.card.name}」</h2>
  <p class="sub" style="margin-bottom:16px">契約の立会人との短い対話です。</p>
  <div class="chat">${chat}</div>
  <div class="inputrow"><textarea id="qin" rows="2" placeholder="ここに答えを書く"></textarea>
  <button class="send" onclick="sendDialogue()">送る</button></div>
  ${done?`<button class="btn" style="margin-top:14px" onclick="finishDialogue()">この問答を契約に反映する</button>`:""}
  <div id="qerr"></div>`;
  window.scrollTo(0,document.body.scrollHeight);
}
async function sendDialogue(){
  const el=document.getElementById("qin");const t=el.value.trim();if(!t)return;
  S.dialogue.push({role:"user",text:t});S.dialogueTurns++;renderDialogue();
  const msgs=S.dialogue.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
  const context={yokaiName:S.yokai.yokai_name,trigger:S.yokai.trigger,typeName:S.type.name,cardName:S.card.name};
  await aiTurn(S.dialogue,()=>callClaudeTask("dialogue",{messages:msgs,context}),false);
}
async function finishDialogue(){
  const transcript=S.dialogue.map(m=>(m.role==="assistant"?"立会人:":"参加者:")+m.text).join("\n");
  app.innerHTML=`<h2>問答をまとめています…</h2>`;
  try{
    const line=await callClaudeTask("sadame",{answers:[transcript]});
    S.practice=line.trim().replace(/^["「』』]|["」]$/g,"");
  }catch(e){S.practice="";}
  go("verbs");
}

  <p class="sub">「${esc(S.yokai.yokai_name)}が現れたら、私は◯◯する」。3つまで選べます。眺めるだけでも、自分の型の偏りが見えてきます。</p>

  <div class="verbgrid">${cat.verbs.map((v,i)=>`
    <button class="verb ${S.verbs.includes(v[0])?"sel":""}" onclick="toggleVerb('${curTab}',${i})">${v[0]}</button>`).join("")}</div>

  <div class="inputrow" style="margin-top:12px">

    <button class="send" onclick="addFree()">追加</button>
  </div>
  <button class="btn" style="margin-top:16px" ${S.verbs.length?"":"disabled"} onclick="go('contract')">契約書を作る</button>`;

function switchTab(id){curTab=id;renderVerbs()}
function toggleVerb(catId,i){
  const v=VERBS.find(c=>c.id===catId).verbs[i];
  const idx=S.verbs.indexOf(v[0]);
  if(idx>=0)S.verbs.splice(idx,1);
  else{if(S.verbs.length>=3)return;S.verbs.push(v[0]);}
  renderVerbs();
  document.getElementById("vhint").textContent=`${v[0]} — ${v[1]}`;
}
function addFree(){
  const el=document.getElementById("freeverb");const t=el.value.trim();
  if(!t||S.verbs.length>=3)return;
  S.verbs.push(t);renderVerbs();
}

/* ---- 契約書 ---- */
function renderContract(){
  const tpl=TEMPLATES[S.type.id];
  const today=new Date();
  const date=`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
  const nameOK=S.userName.trim().length>0;
  const body=tpl.lines
    .filter(l=>!(l.includes("{p}")&&!S.practice))
    .map(l=>l.replace(/\{y\}/g,S.yokai.yokai_name).replace(/\{c\}/g,S.card.name)
      .replace(/\{v\}/g,S.verbs.join("、")).replace(/\{u\}/g,S.userName||"____")
      .replace(/\{p\}/g,S.practice)).join("\n\n")
    +`\n\n${date}\n${S.type.id==="matsuru"?"祀り主":S.type.id==="shieki"?"契約主":S.type.id==="sumiwake"?"取り決め人":"登録者"} ${S.userName||"____"}\n見届け 妖怪ピースラボ`;
  app.innerHTML=`<h2>${tpl.title}</h2>
  <div class="inputrow" style="margin:14px 0">
    <input type="text" id="uname" placeholder="あなたの名前(ニックネーム可)" value="${esc(S.userName)}">
    <button class="send" onclick="setName()">記名</button>
  </div>
  <div class="contract">
    <div class="ctitle">${tpl.title}</div>
    <div class="cbody">${esc(body)}</div>
    <div class="stamp ${nameOK?"on":""}">約</div>
  </div>
  ${nameOK?`
    <button class="btn" style="margin-top:18px" onclick="postEma()">絵馬掛所に奉納する</button>
    <p class="note">奉納すると、妖怪名・対峙法・動詞・運用の定めが他の参加者にも表示されます。名前は表示されません。</p>
    <button class="btn ghost" style="margin-top:8px" onclick="go('board')">奉納せずに絵馬掛所を見る</button>`
   :`<p class="note">記名すると印が押され、奉納できるようになります。</p>`}`;
}
function setName(){S.userName=document.getElementById("uname").value.trim();renderContract()}
async function postEma(){
  const ema={id:Date.now()+"-"+Math.random().toString(36).slice(2,7),
    yokai:S.yokai.yokai_name,type:S.type.name,card:S.card.name,
    verbs:S.verbs,practice:S.practice,message:S.yokai.message||"",
    date:new Date().toISOString().slice(0,10),reactions:0};
  try{
    await roomApi("postEma",{room_code:null,ema});
    go("board");
  }catch(e){
    alert("奉納に失敗しました。もう一度お試しください。");
  }
}

/* ---- 絵馬掛所 ---- */
async function renderBoard(){
  app.innerHTML=`<h2>絵馬掛所</h2><p class="sub">奉納された契約たち。「うちにもいる!」で共感を灯せます。</p><div id="emalist" style="margin-top:16px"><p class="note">読み込み中…</p></div>
  <button class="btn ghost" style="margin-top:16px" onclick="go('intro')">はじまりに戻る</button>`;
  let emas=[];
  try{
    const res=await roomApi("listEmas",{room_code:null});
    emas=(res&&res.emas)||[];
  }catch(e){}
  const list=document.getElementById("emalist");
  if(!list)return;
  if(!emas.length){list.innerHTML=`<p class="note">まだ絵馬はありません。最初の一枚を奉納してみましょう。</p>`;return;}
  list.innerHTML=emas.map(e=>`
    <div class="ema">
      <div class="ename">${esc(e.yokai)}</div>
      <div class="emeta">${esc(e.type)} /「${esc(e.card)}」/ ${esc(e.date)}</div>
      <div class="ebody">現れたら:${(e.verbs||[]).map(esc).join("、")}${e.practice?`<br>定め:${esc(e.practice)}`:""}</div>
      <button class="react" onclick="react('${e.id}')">うちにもいる! ${e.reactions||0}</button>
    </div>`).join("");
}
async function react(id){
  try{
    await roomApi("react",{id});
    renderBoard();
  }catch(err){}
}

nav();render();
</script>
</body>
</html>
