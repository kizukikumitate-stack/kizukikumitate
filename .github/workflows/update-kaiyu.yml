name: Update Kaiyu Bands

on:
  push:
    branches: [main]
    paths:
      - 'data/kaiyu.json'
      - 'scripts/update-kaiyu.py'
      - '**/*.html'
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

jobs:
  kaiyu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate kaiyu bands (回遊バンドを台帳から再生成)
        run: python3 scripts/update-kaiyu.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A '*.html'
          git diff --cached --quiet || git commit -m "chore: 回遊バンドを自動更新（data/kaiyu.json 台帳より）"
          git push
