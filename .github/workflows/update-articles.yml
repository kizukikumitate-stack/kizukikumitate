name: Update Note Articles

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日0時(UTC)に実行
  workflow_dispatch:        # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest articles from note.com
        run: |
          curl -s "https://note.com/api/v2/creators/kizukikumitate/contents?kind=note&page=1&per=3" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          arts = d['data']['contents']
          out = []
          for a in arts:
              out.append({
                  'title': a.get('name',''),
                  'url': 'https://note.com/kizukikumitate/n/' + a.get('key',''),
                  'date': (a.get('publishAt','') or '')[:10].replace('-','.'),
                  'likes': a.get('likeCount', 0),
                  'thumb': a.get('eyecatch','')
              })
          print(json.dumps(out, ensure_ascii=False, indent=2))
          " > articles.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --cached --quiet || git commit -m "chore: update articles.json"
          git push
