name: Archive Past Events

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間ごとに実行（終了したイベントを過去の開催へ移動）
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move finished events to "過去の開催"
        run: python3 scripts/archive-events.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add democracy-fitness.html
          git diff --cached --quiet || git commit -m "chore: 終了したイベントを過去の開催へ自動移動"
          git push
