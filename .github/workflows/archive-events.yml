name: Archive Past Events

on:
  schedule:
    - cron: '0 */6 * * *'   # 6時間ごとに実行（終了したイベントを過去の開催へ移動）
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

# HTMLを自動commitするワークフロー（nav / kaiyu / archive-events）は同じグループで直列化する。
# 同時に走ると push が非fast-forwardで衝突するため。
concurrency:
  group: html-autocommit
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive finished events (一覧は過去へ移動 / トップは削除)
        run: python3 scripts/archive-events.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add democracy-fitness.html index.html
          git diff --cached --quiet || git commit -m "chore: 終了したイベントを自動整理（一覧は過去へ移動・トップは削除）"
          git push
