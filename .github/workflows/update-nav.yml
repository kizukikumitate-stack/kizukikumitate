name: Update Global Nav & Footer

on:
  push:
    branches: [main]
    paths:
      - 'data/nav.json'
      - 'scripts/update-nav.py'
      - '**/*.html'
  workflow_dispatch:          # 手動実行も可能

permissions:
  contents: write

# HTMLを自動commitするワークフロー（nav / kaiyu / archive-events）は同じグループで直列化する。
# 同時に走ると push が非fast-forwardで衝突するため。
concurrency:
  group: html-autocommit
  cancel-in-progress: false

jobs:
  nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 台帳の検証も兼ねる。台帳に未登録のページがあると、ここで失敗して気づける。
      - name: Regenerate nav & footer (ナビ・フッターを台帳から再生成)
        run: python3 scripts/update-nav.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A '*.html'
          git diff --cached --quiet && exit 0
          git commit -m "chore: グローバルナビ・フッターを自動更新（data/nav.json 台帳より）"
          # 実行中に人間の push が入っていた場合に備えて rebase してから push
          git pull --rebase origin main
          git push
