<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!--
  OGPカード共通テンプレート（build-ogp.mjs から使用）
  body[data-theme] = paper | night      … 配色
  body[data-template] = standard | calc … レイアウト（calc は簡易試算バッジ＋概念チャート）
  --acc … アクセント色（JS から設定）
  #eyebrow / #title(innerHTML) / #sub … build-ogp.mjs が差し込む
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@600;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px}
  body{position:relative;overflow:hidden;font-family:'Noto Serif JP',serif}
  body[data-theme="paper"]{--bg:#faf8f2;--card:#fffef8;--frame:#e7e1d1;--ink:#26215C;--ink2:#4a4652;--brand:#1a5fad;--mut:#8d8877;--grid:#d8d1bf;--axis:#b3ac98}
  body[data-theme="night"]{--bg:#100e0a;--card:#191510;--frame:#3a3120;--ink:#f3ead6;--ink2:#c3b699;--brand:#d9a441;--mut:#a1957a;--grid:#4a3f2a;--axis:#6b5f45}
  body{
    background:
      radial-gradient(ellipse 52% 58% at 88% 8%, color-mix(in srgb, var(--acc) 16%, transparent), transparent 70%),
      radial-gradient(ellipse 42% 52% at 8% 94%, color-mix(in srgb, var(--acc) 10%, transparent), transparent 70%),
      var(--bg);
    color:var(--ink);
  }
  .frame{position:absolute;inset:32px;border:1px solid var(--frame);border-radius:26px;background:var(--card)}
  .pad{position:absolute;inset:32px;padding:64px 74px;display:flex;flex-direction:column;justify-content:space-between}
  .eyebrow{font-family:'Jost','Noto Serif JP',sans-serif;font-size:22px;letter-spacing:.22em;font-weight:500;color:var(--acc);text-transform:uppercase}
  h1{font-family:'Shippori Mincho',serif;font-weight:800;font-size:74px;line-height:1.22;letter-spacing:.04em;margin:24px 0 0;max-width:1010px}
  .sub{font-size:29px;line-height:1.68;color:var(--ink2);margin-top:28px;max-width:940px;font-weight:300}
  .bar{width:200px;height:9px;border-radius:5px;background:var(--acc);margin-top:36px}
  .brand{display:flex;align-items:center;gap:15px;font-family:'Shippori Mincho',serif;font-weight:800;font-size:25px;color:var(--ink);letter-spacing:.05em}
  .brand .dot{width:15px;height:15px;border-radius:4px;background:var(--brand)}
  /* calc レイアウト（未来リスク計算機用） */
  .badge,.chart{display:none}
  body[data-template="calc"] h1{font-size:66px;max-width:720px}
  body[data-template="calc"] .sub{font-size:27px;max-width:720px;margin-top:24px}
  body[data-template="calc"] .badge{display:inline-flex;position:absolute;top:64px;right:78px;align-items:center;gap:9px;
    font-family:'Jost','Noto Serif JP',sans-serif;font-size:19px;letter-spacing:.08em;font-weight:500;color:var(--mut);
    border:1px solid var(--frame);border-radius:999px;padding:9px 18px;background:color-mix(in srgb,var(--card) 88%,var(--bg))}
  body[data-template="calc"] .badge b{color:var(--ink);font-weight:600}
  body[data-template="calc"] .chart{display:block;position:absolute;right:78px;bottom:120px;width:300px;height:190px}
  .chart svg{width:100%;height:100%;overflow:visible}
</style>
</head>
<body data-theme="paper" data-template="standard" style="--acc:#1a5fad">
  <div class="frame"></div>
  <div class="badge">無料ツール・<b>簡易試算</b></div>
  <div class="chart">
    <svg viewBox="0 0 300 190" xmlns="http://www.w3.org/2000/svg">
      <line x1="20" y1="10" x2="20" y2="160" stroke="var(--grid)" stroke-width="2"/>
      <line x1="20" y1="160" x2="290" y2="160" stroke="var(--grid)" stroke-width="2"/>
      <path d="M20 60 Q95 70 150 96 T280 150" fill="none" stroke="var(--acc)" stroke-width="4" stroke-linecap="round"/>
      <line x1="222" y1="18" x2="222" y2="160" stroke="var(--acc)" stroke-width="2" stroke-dasharray="5 5" opacity="0.7"/>
      <circle cx="222" cy="132" r="7" fill="var(--acc)"/>
      <text x="222" y="182" text-anchor="middle" font-family="'Jost',sans-serif" font-size="16" fill="var(--mut)">試算の年</text>
      <text x="120" y="182" text-anchor="middle" font-family="'Jost',sans-serif" font-size="15" fill="var(--axis)">時間 →</text>
    </svg>
  </div>
  <div class="pad">
    <div>
      <div class="eyebrow" id="eyebrow">EYEBROW</div>
      <h1 id="title">タイトル</h1>
      <div class="sub" id="sub">サブ</div>
      <div class="bar"></div>
    </div>
    <div class="brand"><span class="dot"></span>きづきくみたて工房</div>
  </div>
</body>
</html>
